<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projectenoverzicht.nl — mobile app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ECEAE6; }
  body {
    font-family: 'Barlow', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #4A4A4A;
  }
  #root {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    box-sizing: border-box;
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0 }
    to { transform: translateY(0); opacity: 1 }
  }
  /* Transform-only slide for full-screen sheets. No opacity, so the
     sheet stays visible even if the animation engine never advances
     (e.g. backgrounded tab) — it just won't slide. */
  @keyframes sheetUp {
    from { transform: translateY(26px) }
    to { transform: translateY(0) }
  }
  @keyframes pinDrop {
    0% { transform: translate(-50%, -120%) scale(0.5); opacity: 0 }
    60% { transform: translate(-50%, -95%) scale(1.1); opacity: 1 }
    100% { transform: translate(-50%, -100%) scale(1); opacity: 1 }
  }
  @keyframes bubblePop {
    from { transform: scale(0.6); opacity: 0 }
    to { transform: scale(1); opacity: 1 }
  }
  @keyframes pulseLogo {
    0%, 100% { transform: scale(1) }
    50% { transform: scale(1.05) }
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  /* Hide scrollbars inside the phone frame */
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* Leaflet tweaks */
  .leaflet-div-icon { background: transparent; border: none; }
  .leaflet-container { font-family: 'Barlow', sans-serif; background: #eef0ec; }
  .leaflet-control-attribution { font-size: 9px; opacity: 0.7; }
  /* Kill the faint white seams between map tiles (sub-pixel gaps) */
  .leaflet-tile { width: 256.5px !important; height: 256.5px !important; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (in-browser transpile, no build step) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Supabase client (optioneel — valt terug op mock-data als niet bereikbaar) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- App-code. Volgorde is belangrijk: data → API → componenten → schermen → app -->
<script src="src/core/data.js"></script>
<script src="src/core/db.js"></script>
<script type="text/babel" src="src/components/components.jsx"></script>
<script type="text/babel" src="src/screens/screens.jsx"></script>
<script type="text/babel" src="src/screens/new-project.jsx"></script>
<script type="text/babel" src="src/auth/auth.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
